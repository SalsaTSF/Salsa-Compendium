<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salsa 3.0 - Block Turns</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
            background: #000;
        }

        .level {
            color: #D4AF37;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .category-title {
            color: #D4AF37;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .content {
            background: #E8E8E8;
            min-height: calc(100vh - 200px);
            padding: 30px 20px;
        }

        .week-section {
            margin-bottom: 40px;
        }

        .week-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: #000;
            margin-bottom: 20px;
        }

        .move-button {
            width: 100%;
            background: #D4AF37;
            border: none;
            border-radius: 8px;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            margin-bottom: 15px;
            text-align: left;
            transition: all 0.2s;
        }

        .move-button:active {
            transform: scale(0.98);
            background: #C4A027;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            background: #D4AF37;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            color: #000;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            color: #000;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .modal-footer {
            background: #fff;
            padding: 20px;
            text-align: center;
        }

        .close-button {
            background: #D4AF37;
            border: none;
            border-radius: 8px;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            width: 100%;
        }

        @media (max-width: 768px) {
            .category-title {
                font-size: 2rem;
            }
            
            .week-title {
                font-size: 1.5rem;
            }

            .modal {
                padding: 0;
            }

            .modal-content {
                max-width: 100%;
                width: 100%;
                height: 100%;
                max-height: 100vh;
                border-radius: 0;
            }

            .modal-header {
                padding: 15px 20px;
            }

            .modal-title {
                font-size: 1.2rem;
            }

            .video-container {
                padding-bottom: 75vh;
            }

            .modal-footer {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="level">Salsa 3.0</div>
        <div class="category-title">Block Turns</div>
    </div>

    <div class="content">
        <!-- Week 1 -->
        <div class="week-section">
            <h2 class="week-title">Week 1</h2>
            <button class="move-button" onclick="openVideo('Right Block Double', 'YOUTUBE_VIDEO_ID')">Right Block Double</button>
            <button class="move-button" onclick="openVideo('Left Block Double', 'YOUTUBE_VIDEO_ID')">Left Block Double</button>
            <button class="move-button" onclick="openVideo('Shoulder Block Hook', 'YOUTUBE_VIDEO_ID')">Shoulder Block Hook</button>
            <button class="move-button" onclick="openVideo('Full Week 1', '9t6al3hW0JY')">Full Week 1</button>
        </div>

        <!-- Week 2 -->
        <div class="week-section">
            <h2 class="week-title">Week 2</h2>
            <button class="move-button" onclick="openVideo('Move Name', 'YOUTUBE_VIDEO_ID')">Move Name</button>
            <button class="move-button" onclick="openVideo('Move Name', 'YOUTUBE_VIDEO_ID')">Move Name</button>
        </div>

        <!-- Week 3 -->
        <div class="week-section">
            <h2 class="week-title">Week 3</h2>
            <button class="move-button" onclick="openVideo('Move Name', 'YOUTUBE_VIDEO_ID')">Move Name</button>
            <button class="move-button" onclick="openVideo('Move Name', 'YOUTUBE_VIDEO_ID')">Move Name</button>
        </div>

        <!-- Week 4 -->
        <div class="week-section">
            <h2 class="week-title">Week 4</h2>
            <button class="move-button" onclick="openVideo('Move Name', 'YOUTUBE_VIDEO_ID')">Move Name</button>
            <button class="move-button" onclick="openVideo('Full Month Demo', 'YOUTUBE_VIDEO_ID')">Full Month Demo</button>
        </div>
    </div>

    <!-- Video Modal -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Move Name</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="video-container" id="videoContainer">
            </div>
            <div class="modal-footer">
                <button class="close-button" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        function openVideo(moveName, videoId) {
            const modal = document.getElementById('videoModal');
            const modalTitle = document.getElementById('modalTitle');
            const videoContainer = document.getElementById('videoContainer');

            modalTitle.textContent = moveName;

            if (videoId && videoId !== 'YOUTUBE_VIDEO_ID') {
                videoContainer.innerHTML = `
                    <iframe 
                        src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                `;
            } else {
                videoContainer.innerHTML = `
                    <div style="padding: 60px 20px; text-align: center; color: #666;">
                        <p>Video not yet added</p>
                        <small>Replace YOUTUBE_VIDEO_ID with actual video ID</small>
                    </div>
                `;
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('videoModal');
            const videoContainer = document.getElementById('videoContainer');
            
            modal.classList.remove('active');
            document.body.style.overflow = '';
            
            // Stop video playback
            videoContainer.innerHTML = '';
        }

        // Close modal when clicking outside
        document.getElementById('videoModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
