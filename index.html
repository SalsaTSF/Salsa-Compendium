<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salsa 3.0 Compendium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 60px 20px 40px;
            background: #000;
        }

        .title {
            color: #D4AF37;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #D4AF37;
            font-size: 1.3rem;
            font-weight: 600;
            opacity: 0.8;
        }

        .content {
            background: #E8E8E8;
            min-height: calc(100vh - 200px);
            padding: 40px 20px;
        }

        .categories-grid {
            max-width: 800px;
            margin: 0 auto;
        }

        .category-button {
            width: 100%;
            background: #D4AF37;
            border: none;
            border-radius: 12px;
            padding: 30px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            margin-bottom: 20px;
            text-align: center;
            transition: all 0.2s;
            text-decoration: none;
            display: block;
        }

        .category-button:active {
            transform: scale(0.98);
            background: #C4A027;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }

            .category-button {
                font-size: 1.3rem;
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">SALSA 3.0</h1>
        <div class="subtitle">Dance Compendium</div>
    </div>

    <div class="content">
        <div class="categories-grid">
            <a href="block-turns.html" class="category-button">Block Turns</a>
            <a href="category2.html" class="category-button">Category 2</a>
            <a href="category3.html" class="category-button">Category 3</a>
            <a href="category4.html" class="category-button">Category 4</a>
            <a href="category5.html" class="category-button">Category 5</a>
            <a href="category6.html" class="category-button">Category 6</a>
        </div>
    </div>
</body>
</html>
